name: LumiOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── PR checks (unchanged) ──

  typecheck:
    name: TypeScript type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit

  rust-check:
    name: Rust backend check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Build frontend dist
        run: npx vite build
      - name: Create stub resource dirs for CI
        run: |
          mkdir -p desktop-resources/dist-server
          mkdir -p desktop-resources/gpt-sovits-src
          mkdir -p desktop-resources/data/voice_training
          touch desktop-resources/dist-server/.gitkeep
          touch desktop-resources/gpt-sovits-src/.gitkeep
          touch desktop-resources/data/voice_training/.gitkeep
          touch desktop-resources/WebView2Loader.dll
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev libayatana-appindicator3-dev libdbus-1-dev libxdo-dev libxtst-dev
      - name: Check Rust backend
        run: cargo check --release
        working-directory: src-tauri

  test:
    name: Unit tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm test

  frontend-build:
    name: Frontend Vite build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx vite build

  # ── Cross-platform installer builds ──

  build:
    name: Build (${{ matrix.target }})
    needs: [typecheck, rust-check, test, frontend-build]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-x64
            runner: windows-latest
          - target: macos-arm64
            runner: macos-latest
          - target: linux-x64
            runner: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev libayatana-appindicator3-dev libdbus-1-dev libxdo-dev libxtst-dev

      - run: npm ci

      - name: Download Node.js binary
        run: node scripts/download-node-binary.mjs

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri app (non-Linux)
        if: runner.os != 'Linux'
        run: npm run tauri:build

      - name: Build Tauri app (Linux, with retry for GH release downloads)
        if: runner.os == 'Linux'
        run: |
          # Pre-download AppRun binary with retry to avoid 504 during Tauri bundling
          APPRUN_URL="https://github.com/tauri-apps/binary-releases/releases/download/apprun-old/AppRun-x86_64"
          APPRUN_DIR="$HOME/.cache/tauri"
          mkdir -p "$APPRUN_DIR"
          echo "Downloading AppRun binary with retry..."
          curl --retry 10 --retry-delay 15 --retry-max-time 600 --connect-timeout 30 \
            -L "$APPRUN_URL" -o "$APPRUN_DIR/AppRun-x86_64" || echo "Pre-download failed, will rely on Tauri's built-in download"

          # Build with retries for resilience against transient network issues
          for i in 1 2 3; do
            if npm run tauri:build; then
              exit 0
            fi
            if [ $i -lt 3 ]; then
              echo "Build attempt $i failed, retrying in 30s..."
              sleep 30
            fi
          done
          exit 1

      - name: Upload Windows installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: lumi-os-${{ matrix.target }}
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload macOS installer
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: lumi-os-${{ matrix.target }}
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload Linux installers
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: lumi-os-${{ matrix.target }}
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage*
          if-no-files-found: error

  # ── GitHub Release ──

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: lumi-os-*
          path: artifacts
          merge-multiple: true

      - name: Generate release tag
        id: tag
        run: echo "tag=v$(date +'%Y.%m.%d')-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          files: artifacts/**
          draft: false
          prerelease: true

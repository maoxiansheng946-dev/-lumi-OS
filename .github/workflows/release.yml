name: LumiOS Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: windows
            os: windows-latest
            artifact: msi
          - target: macos
            os: macos-latest
            artifact: dmg
          - target: linux
            os: ubuntu-latest
            artifact: deb

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install -g pnpm@11.3.0

      - run: pnpm install --ignore-scripts

      - name: Build server dist
        run: pnpm --filter @lumios/server build

      - name: Install Linux system deps
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libx11-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev libayatana-appindicator3-dev libdbus-1-dev libxcb1-dev libxcb-shape0-dev libxcb-xfixes0-dev libxcb-render0-dev libxcb-shm0-dev libxcb-xkb-dev

      - uses: dtolnay/rust-toolchain@stable

      - name: Build Tauri app
        id: tauri-build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: |
          case "${{ matrix.target }}" in
            windows) bundles="msi" ;;
            macos)   bundles="dmg" ;;
            linux)   bundles="deb" ;;
          esac
          cd packages/desktop
          npx tauri build --bundles "$bundles" -c src-tauri/tauri.conf.json 2>&1 | tee /tmp/tauri-build.log
          exit ${PIPESTATUS[0]}

      - name: Show build error
        if: failure() && steps.tauri-build.outcome == 'failure'
        run: tail -40 /tmp/tauri-build.log | while IFS= read -r line; do echo "::error::${line}"; done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lumi-os-${{ matrix.target }}
          path: |
            packages/desktop/src-tauri/target/release/bundle/msi/*.msi
            packages/desktop/src-tauri/target/release/bundle/dmg/*.dmg
            packages/desktop/src-tauri/target/release/bundle/deb/*.deb
            packages/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

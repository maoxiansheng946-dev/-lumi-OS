# =============================================================================
# LumiOS CI/CD Pipeline
# =============================================================================
# Triggers:
#   push/PR to main   → typecheck, test, build, Docker image
#   push to main      → + Docker push
#   workflow_dispatch → manual trigger
# =============================================================================

name: LumiOS CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Docker image registry — set these in GitHub repo secrets:
#   DOCKER_REGISTRY  (e.g. ghcr.io or docker.io)
#   DOCKER_USERNAME
#   DOCKER_PASSWORD
env:
  DOCKER_IMAGE_NAME: lumi-os

jobs:
  # ── PR verification jobs ──────────────────────────────────────────────────

  typecheck:
    name: TypeScript type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit

  rust-check:
    name: Rust backend check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: Build frontend dist
        run: npx vite build
      - name: Create stub resource dirs for CI
        run: |
          mkdir -p desktop-resources/dist-server
          mkdir -p desktop-resources/gpt-sovits-src
          mkdir -p desktop-resources/data/voice_training
          touch desktop-resources/dist-server/.gitkeep
          touch desktop-resources/gpt-sovits-src/.gitkeep
          touch desktop-resources/data/voice_training/.gitkeep
          touch desktop-resources/WebView2Loader.dll
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev libdbus-1-dev
      - name: Check Rust backend
        run: cargo check --release
        working-directory: src-tauri

  test:
    name: Unit tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm test

  frontend-build:
    name: Frontend Vite build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npx vite build

  # ── Docker image build & push ─────────────────────────────────────────────

  docker:
    name: Docker build & push
    needs: [typecheck, test, frontend-build]
    # Push to registry only on main branch pushes (not PRs)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # needed for ghcr.io push
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # ── Build-time secrets (not baked into image layers) ──
          # These are passed as --mount=type=secret in Dockerfile
          # secrets: |
          #   NPM_TOKEN=${{ secrets.NPM_TOKEN }}

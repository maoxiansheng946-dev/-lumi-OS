name: LumiOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Single debug job first — remove once CI is stable
  debug-install:
    name: Debug pnpm install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g pnpm
      - run: pnpm --version
      - run: node --version
      - run: cat .npmrc 2>/dev/null || true
      - run: pnpm install 2>&1 || true
      - run: pnpm install --frozen-lockfile 2>&1 || true

  server-typecheck:
    name: Server type-check
    runs-on: ubuntu-latest
    needs: debug-install
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g pnpm
      - run: pnpm install
      - run: pnpm --filter @lumios/server lint

  desktop-typecheck:
    name: Desktop type-check
    runs-on: ubuntu-latest
    needs: debug-install
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g pnpm
      - run: pnpm install
      - run: pnpm --filter @lumios/desktop lint

  web-typecheck:
    name: Web type-check
    runs-on: ubuntu-latest
    needs: debug-install
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g pnpm
      - run: pnpm install
      - run: pnpm --filter @lumios/web lint

  mobile-typecheck:
    name: Mobile type-check
    runs-on: ubuntu-latest
    needs: debug-install
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g pnpm
      - run: pnpm install
      - run: pnpm --filter @lumios/mobile lint

  rust-check:
    name: Rust backend check
    runs-on: ubuntu-latest
    needs: debug-install
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g pnpm
      - run: pnpm install
      - name: Build frontend dist
        run: pnpm --filter @lumios/desktop build
      - name: Create stub resource dirs for CI
        run: |
          mkdir -p packages/desktop/desktop-resources/dist-server
          mkdir -p packages/desktop/desktop-resources/gpt-sovits-src
          mkdir -p packages/desktop/desktop-resources/data/voice_training
          touch packages/desktop/desktop-resources/dist-server/.gitkeep
          touch packages/desktop/desktop-resources/gpt-sovits-src/.gitkeep
          touch packages/desktop/desktop-resources/data/voice_training/.gitkeep
          touch packages/desktop/desktop-resources/WebView2Loader.dll
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev libayatana-appindicator3-dev libdbus-1-dev
      - name: Check Rust backend
        run: cargo check --release
        working-directory: packages/desktop/src-tauri

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: debug-install
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g pnpm
      - run: pnpm install
      - run: pnpm --filter @lumios/server test
      - run: pnpm --filter @lumios/web test

  frontend-build:
    name: Frontend Vite build
    runs-on: ubuntu-latest
    needs: debug-install
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g pnpm
      - run: pnpm install
      - run: pnpm --filter @lumios/web build
      - run: pnpm --filter @lumios/desktop build
